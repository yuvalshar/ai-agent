services:
  db:
    image: postgres:16
    container_name: miniagent-postgres
    environment:
      POSTGRES_USER: miniagent
      POSTGRES_PASSWORD: miniagent_password
      POSTGRES_DB: miniagent_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  
volumes:
  pgdata: